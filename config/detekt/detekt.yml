# Overrides applied on top of Detekt's default rules (buildUponDefaultConfig = true).
# Only list what you want to change here — everything else uses Detekt defaults.

# Note: Detekt's `formatting` ruleset is intentionally NOT configured here — it
# requires the detekt-formatting dependency and would overlap with ktlint, which
# owns formatting in this project.

style:
  MagicNumber:
    # Very noisy in UI code (paddings, weights, sizes). Re-enable later if wanted.
    active: false
  ReturnCount:
    active: true
    max: 4
  MaxLineLength:
    maxLineLength: 120
  ForbiddenComment:
    # TODO markers are expected while the capstone is in progress.
    active: false
  UnusedPrivateMember:
    # @Preview composables are used by the IDE/tooling, not dead code.
    ignoreAnnotated: ['Preview']

complexity:
  LongMethod:
    active: true
    threshold: 80
  TooManyFunctions:
    # Screens and ViewModels legitimately group many small functions.
    active: false

naming:
  FunctionNaming:
    # Allow @Composable PascalCase functions.
    ignoreAnnotated: ['Composable']
