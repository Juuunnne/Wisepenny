ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.wisepenny.server.ApplicationKt.module ]
    }
}

app {
    # "dev" enables the demo seeder. Set APP_ENV=prod to disable it.
    environment = "dev"
    environment = ${?APP_ENV}
}

db {
    jdbcUrl = "jdbc:postgresql://localhost:5432/wisepenny"
    jdbcUrl = ${?DB_JDBC_URL}
    user = "wisepenny"
    user = ${?DB_USER}
    password = "wisepenny"
    password = ${?DB_PASSWORD}
    driver = "org.postgresql.Driver"
}
