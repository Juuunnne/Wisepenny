# Continuous integration for Wisepenny.
# Builds the shared module and runs the unit-test suite (mappers + auto-save money
# math) on every push and pull request. iOS tests are omitted here because they need
# a macOS runner; the JVM/Android unit tests cover all the shared business logic.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# A newer push to the same branch cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # AGP 8.11 requires JDK 17 to run the Gradle build.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Ensures the Android SDK / licenses are available so AGP can resolve compileSdk 36.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Configures Gradle with build caching for faster subsequent runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      # Server integration tests. Testcontainers starts a throwaway PostgreSQL via the
      # Docker daemon that ubuntu-latest runners provide out of the box — no extra setup.
      - name: Run server integration tests
        run: ./gradlew :server:test --stacktrace

      # Keeps the HTML/XML reports even when a test fails, for inspection.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: composeApp/build/reports/tests/
          if-no-files-found: ignore

      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: server/build/reports/tests/
          if-no-files-found: ignore
